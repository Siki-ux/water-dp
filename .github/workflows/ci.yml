name: Application CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  api-lint:
    name: API Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.2
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: api/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('api/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run linting (Ruff)
        run: poetry run ruff check .

      - name: Check formatting (Black)
        run: poetry run black --check .

  api-test:
    name: API Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.2
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        uses: actions/cache@v4
        with:
          path: api/.venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('api/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction --with dev

      - name: Run tests
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/water_data"
          GEOSERVER_URL: "http://localhost:8080/geoserver"
          GEOSERVER_USERNAME: "admin"
          GEOSERVER_PASSWORD: "geoserver"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          TIMEIO_DB_PASSWORD: "testpassword"
          MQTT_PASSWORD: "testpassword"
          FERNET_ENCRYPTION_SECRET: "qkiB7jd7_ajNCcy7XeGp7x1uPTurnz9zXsXkU8F8xtE="
          MINIO_ACCESS_KEY: "minioadmin"
          MINIO_SECRET_KEY: "minioadmin"
        run: poetry run pytest -m "not integration"

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js
        env:
          NEXT_PUBLIC_API_URL: "/water-api/api/v1"
          NEXT_PUBLIC_GEOSERVER_URL: "/geoserver"
        run: npm run build

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [api-test, frontend-build]
    strategy:
      matrix:
        include:
          - name: api
            context: ./api
            dockerfile: ./api/Dockerfile
            build-args: ""
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            build-args: |
              NEXT_PUBLIC_API_URL=/water-api/api/v1
              NEXT_PUBLIC_GEOSERVER_URL=/geoserver
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (${{ matrix.name }})
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: ${{ matrix.build-args }}
          tags: water-dp-${{ matrix.name }}:test
