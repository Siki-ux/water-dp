[pytest]
testpaths = tests
python_files = test_*.py
addopts = -v --cov=app --cov-report=term-missing -m "not integration"
pythonpath = .
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    api: marks tests as API tests
    core: marks tests as core tests
    services: marks tests as service tests
    v1: marks tests as v1 API tests
filterwarnings =
    # Third-party packages not yet updated for Python 3.14/3.16 asyncio API changes
    ignore::DeprecationWarning:pytest_asyncio
    ignore::DeprecationWarning:fastapi
    ignore::DeprecationWarning:slowapi
    ignore::DeprecationWarning:async_property
