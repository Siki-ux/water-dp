name: Deploy to Azure VM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api
            image: water_dp_api
            context: ./api
            dockerfile: Dockerfile
            build-args: ""
          - service: worker
            image: water_dp_worker
            context: ./api
            dockerfile: Dockerfile
            build-args: ""
          - service: simulator
            image: water_dp_simulator
            context: ./api
            dockerfile: Dockerfile
            build-args: ""
          - service: tm_migrations
            image: water_dp_tm_migrations
            context: ./api
            dockerfile: docker/migrations.Dockerfile
            build-args: ""
          - service: tm_seeder
            image: water_dp_tm_seeder
            context: .
            dockerfile: api/docker/seeder.Dockerfile
            build-args: ""
          - service: frontend
            image: water_dp_frontend
            context: ./frontend
            dockerfile: Dockerfile
            build-args: |
              NEXT_PUBLIC_API_URL=http://${{ secrets.PUBLIC_HOSTNAME_URL }}:8000
              NEXT_PUBLIC_GEOSERVER_URL=http://${{ secrets.PUBLIC_HOSTNAME_URL }}:8080/geoserver
              NEXT_PUBLIC_NEXTAUTH_URL=http://${{ secrets.PUBLIC_HOSTNAME_URL }}:3000/portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase REPO
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build-args }}
          tags: |
            ghcr.io/${{ env.REPO }}/${{ matrix.image }}:latest
            ghcr.io/${{ env.REPO }}/${{ matrix.image }}:${{ github.event.release.tag_name || github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: DEV
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downcase REPO
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Generate .env file for Prod
        run: |
          echo "DATABASE_USER=postgres" >> .env
          echo "DATABASE_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "OBJECT_STORAGE_ROOT_USER=minioadmin" >> .env
          echo "OBJECT_STORAGE_ROOT_PASSWORD=${{ secrets.MINIO_PASSWORD }}" >> .env

          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "GEOSERVER_ADMIN_PASSWORD=${{ secrets.GEOSERVER_ADMIN_PASSWORD }}" >> .env

          echo "KEYCLOAK_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}" >> .env
          echo "MQTT_PASSWORD=${{ secrets.MQTT_PASSWORD }}" >> .env

          echo "PUBLIC_HOSTNAME=${{ secrets.PUBLIC_HOSTNAME_URL }}" >> .env
          echo "KEYCLOAK_EXTERNAL_URL=http://${{ secrets.PUBLIC_HOSTNAME_URL }}:8081" >> .env
          echo "GITHUB_REPOSITORY_LOWER=${{ env.REPO }}" >> .env

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          source: "deploy/docker-compose.prod.yml,.env,mosquitto.conf,nginx_proxy_api.conf,timeio.env,keycloak/import,scripts/setup_keycloak.sh"
          target: "~/water-dp"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          command_timeout: 60m
          script: |
            cd ~/water-dp

            # Login to GHCR to pull private images
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Stop running containers (preserve volumes)
            docker compose -f deploy/docker-compose.prod.yml down || true

            # Clean up unused images and containers
            docker system prune -af
            docker volume prune -f

            # Pull latest images
            docker compose -f deploy/docker-compose.prod.yml pull --quiet

            # Start services
            docker compose -f deploy/docker-compose.prod.yml up -d
