# Load Testing Stack
# Run: docker compose -f docker-compose.loadtest.yml up
# Scale workers: docker compose -f docker-compose.loadtest.yml up --scale worker=4
#
# Web UI: http://localhost:8089
# Target: The water-dp API (configure via LOAD_TEST_TARGET)

services:
  master:
    image: locustio/locust:2.32.4
    ports:
      - "8089:8089"
    volumes:
      - ./api/tests/load:/mnt/locust
    command: >
      -f /mnt/locust/locustfile.py
      --master
      --host ${LOAD_TEST_TARGET:-http://water-dp-api:8000}
    environment:
      - LOAD_TEST_USERNAME=${LOAD_TEST_USERNAME:-admin}
      - LOAD_TEST_PASSWORD=${LOAD_TEST_PASSWORD:-admin}
      - API_PREFIX=${API_PREFIX:-/api/v1}

  worker:
    image: locustio/locust:2.32.4
    volumes:
      - ./api/tests/load:/mnt/locust
    command: >
      -f /mnt/locust/locustfile.py
      --worker
      --master-host master
    environment:
      - LOAD_TEST_USERNAME=${LOAD_TEST_USERNAME:-admin}
      - LOAD_TEST_PASSWORD=${LOAD_TEST_PASSWORD:-admin}
      - API_PREFIX=${API_PREFIX:-/api/v1}
    depends_on:
      - master
    deploy:
      replicas: 2
